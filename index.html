<div id="app">
  <header class="bar">
    <div class="brand">
      <div class="mark"></div>
      <div class="btxt">
        <strong>Mon'Archi Preview Studio</strong>
        <span id="metaLine">1000 × 750 · Upwork Project Catalog</span>
      </div>
    </div>
    <div class="exports">
      <button class="btn ghost" id="pngBtn">↓ Export PNG</button>
      <button class="btn solid" id="jpgBtn">↓ Export JPEG</button>
    </div>
  </header>

  <div class="body">
    <aside class="side">
      <section>
        <div class="lbl">Format</div>
        <select id="fmt" class="field">
          <option value="catalog">Upwork Project Catalog (1000×750)</option>
          <option value="portfolio">Upwork Portfolio (1000×750)</option>
        </select>
      </section>

      <section>
        <div class="lbl">Template</div>
        <div class="cards" id="cards"></div>
      </section>

      <hr/>

      <section>
        <div class="lbl">Palette <span class="hint">presets</span></div>
        <div class="presets" id="presets"></div>
      </section>

      <section>
        <div class="lbl">Colors</div>
        <div class="crow"><label>Background top</label><input type="color" id="cBgA"/></div>
        <div class="crow"><label>Background bottom</label><input type="color" id="cBgB"/></div>
        <div class="crow"><label>Glow</label><input type="color" id="cGlow"/></div>
        <div class="crow"><label>Accent (gold)</label><input type="color" id="cGold"/></div>
        <div class="crow"><label>Highlight (magenta)</label><input type="color" id="cMag"/></div>
      </section>

      <hr/>

      <section>
        <div class="lbl">Kicker (small tag)</div>
        <input id="kicker" class="field" type="text" maxlength="42"/>
      </section>

      <section>
        <div class="lbl">Title</div>
        <textarea id="title" class="field" rows="2" maxlength="90"></textarea>
      </section>

      <section>
        <div class="lbl">Subtitle</div>
        <textarea id="subtitle" class="field" rows="2" maxlength="140"></textarea>
      </section>

      <section>
        <div class="lbl">Metrics <span class="hint">(empty value = hidden)</span></div>
        <div class="mrow"><input id="m1v" class="field sm" placeholder="420%"/><input id="m1l" class="field" placeholder="Average ROAS"/></div>
        <div class="mrow"><input id="m2v" class="field sm" placeholder="100+"/><input id="m2l" class="field" placeholder="Projects scaled"/></div>
        <div class="mrow"><input id="m3v" class="field sm" placeholder="$1.5M+"/><input id="m3l" class="field" placeholder="Ad budget managed"/></div>
      </section>

      <hr/>

      <section>
        <div class="lbl">Image</div>
        <div class="slot tall" id="imgSlot">
          <div class="slot-in"><span class="up">⬆</span><b>Main image</b><i>click or drop</i></div>
        </div>
        <button class="mini" id="imgClear" hidden>Remove image</button>
        <input id="imgFile" type="file" accept="image/*" hidden/>
      </section>

      <hr/>
      <button class="btn reset" id="resetBtn">Reset all to default</button>
      <div class="foot">Auto-saved in your browser · Deploy this file to GitHub Pages</div>
    </aside>

    <main class="stage">
      <div class="canvas-wrap">
        <canvas id="cv"></canvas>
        <div class="drophint">Drop an image on the canvas</div>
      </div>
    </main>
  </div>
</div>

<style>
  :root{
    --bg:#0e0a12; --panel:#171019; --panel2:#1d1422; --line:#2c1f33;
    --txt:#ece4f0; --mut:#9a8aa3; --gold:#E8C079; --pur:#B760C9; --mag:#C24BC2;
  }
  *{box-sizing:border-box}
  #app{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--txt);background:var(--bg);
       min-height:100vh;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:16px;height:58px;
       padding:0 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#181019,#120c16);
       position:sticky;top:0;z-index:30}
  .brand{display:flex;align-items:center;gap:12px}
  .mark{width:34px;height:34px;border-radius:50%;background:#45164a;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
  .mark::before{content:"M";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
       font:700 17px "Space Grotesk",sans-serif;color:#fff}
  .btxt{display:flex;flex-direction:column;line-height:1.15}
  .btxt strong{font-size:14px;letter-spacing:.2px}
  .btxt span{font-family:"Space Mono",monospace;font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
  .exports{display:flex;gap:10px}
  .btn{font:600 12.5px "Space Grotesk",sans-serif;border-radius:9px;padding:9px 14px;cursor:pointer;border:1px solid var(--line);
       transition:.15s;display:inline-flex;align-items:center;gap:6px}
  .btn.ghost{background:#1c1422;color:var(--txt)} .btn.ghost:hover{border-color:var(--pur)}
  .btn.solid{background:linear-gradient(180deg,#cf6cdd,#a23f9e);color:#fff;border:none}
  .btn.solid:hover{filter:brightness(1.08)}
  .body{flex:1;display:flex;min-height:0}
  .side{width:340px;flex:none;border-right:1px solid var(--line);background:var(--panel);
        padding:18px;overflow:auto;display:flex;flex-direction:column;gap:16px}
  .side section{display:flex;flex-direction:column;gap:8px}
  hr{border:none;border-top:1px solid var(--line);margin:2px 0}
  .lbl{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut)}
  .hint{text-transform:none;letter-spacing:0;opacity:.7}
  .field{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
         padding:9px 11px;font:500 13px "Space Grotesk",sans-serif;width:100%;outline:none;resize:vertical}
  .field:focus{border-color:var(--pur)}
  select.field{appearance:none;cursor:pointer}
  .mrow{display:flex;gap:8px} .field.sm{width:96px;flex:none}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;text-align:left;
        transition:.15s;display:flex;flex-direction:column;gap:7px}
  .card:hover{border-color:var(--pur)}
  .card.on{border-color:var(--mag);box-shadow:0 0 0 1px var(--mag) inset}
  .card .sw{height:38px;border-radius:6px;overflow:hidden;position:relative}
  .card .nm{font-size:11.5px;font-weight:600;color:#ffffff}
  .card .num{font-family:"Space Mono",monospace;font-size:9px;color:var(--mut)}
  .presets{display:flex;gap:8px}
  .preset{flex:1;height:32px;border-radius:8px;border:1px solid var(--line);cursor:pointer;transition:.15s}
  .preset:hover{border-color:var(--pur)}
  .preset.on{box-shadow:0 0 0 2px var(--mag);border-color:var(--mag)}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .crow label{font-size:12.5px;color:var(--txt)}
  input[type=color]{width:48px;height:30px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);padding:2px;cursor:pointer}
  .slot{border:1.5px dashed var(--line);border-radius:11px;background:var(--panel2);cursor:pointer;
        min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;transition:.15s}
  .slot:hover{border-color:var(--pur)}
  .slot.drag{border-color:var(--mag);background:#241626}
  .slot-in{display:flex;flex-direction:column;gap:3px;color:var(--mut);padding:10px}
  .slot-in .up{font-size:18px;color:var(--pur)} .slot-in b{font-size:12px;color:var(--txt)}
  .slot-in i{font-size:10px;font-style:normal;opacity:.8}
  .slot img{width:100%;height:100%;object-fit:contain;max-height:160px;background:
        repeating-conic-gradient(#1a1320 0% 25%, #221729 0% 50%) 50%/16px 16px}
  .mini{align-self:flex-start;background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;text-decoration:underline;padding:0}
  .mini:hover{color:var(--mag)}
  .btn.reset{background:#1c1422;border:1px solid var(--line);color:#e9a06b;font-weight:600;width:100%;justify-content:center}
  .btn.reset:hover{border-color:#e9a06b}
  .foot{font-family:"Space Mono",monospace;font-size:9.5px;color:var(--mut);letter-spacing:.5px;text-align:center;line-height:1.5}
  .stage{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;padding:26px;overflow:hidden;
         background:radial-gradient(120% 120% at 50% 0%, #160f1b 0%, #0c080f 70%)}
  .canvas-wrap{position:relative;aspect-ratio:4 / 3;width:100%;max-width:100%;max-height:100%}
  #cv{width:100%;height:100%;display:block;border-radius:14px;
      box-shadow:0 30px 80px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.05)}
  .drophint{position:absolute;inset:0;border-radius:14px;display:none;align-items:center;justify-content:center;
       background:rgba(20,10,24,.7);color:#fff;font:600 15px "Space Grotesk";border:2px dashed var(--mag);pointer-events:none}
  .canvas-wrap.drag .drophint{display:flex}
  .ov{position:fixed;inset:0;background:rgba(8,5,10,.8);display:flex;align-items:center;justify-content:center;z-index:60;padding:24px}
  .ovbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:700px;width:100%;padding:16px;display:flex;flex-direction:column;gap:12px}
  .ovtop{display:flex;align-items:center;justify-content:space-between}
  .ovtop b{font-size:14px}
  .ovx{background:none;border:none;color:var(--mut);font-size:17px;cursor:pointer;line-height:1}
  .ovbox img{width:100%;border-radius:10px;border:1px solid var(--line);display:block}
  .ovrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ovbox a.btn{text-decoration:none}
  .ovhint{font-size:11px;color:var(--mut);flex:1;min-width:160px}
  @media(max-width:860px){
    #app{min-height:auto}
    .body{flex-direction:column}
    .stage{order:-1;position:sticky;top:58px;z-index:10;flex:none;height:42vh;min-height:190px;
           padding:12px;border-bottom:1px solid var(--line)}
    .side{width:100%;border-right:none;overflow:visible}
    .bar{gap:8px;padding:0 12px}
    .btxt span{display:none}
    .btxt strong{font-size:13px}
    .exports .btn{padding:8px 10px;font-size:11.5px}
    .field,select.field,.crow label{font-size:13.5px}
    input[type=color]{height:34px}
  }
</style>

      const g=ctx.createLinearGradient(0,0,1000,750); g.addColorStop(0,T.bgA); g.addColorStop(1,T.bgB);
      ctx.fillStyle=g; ctx.fillRect(0,0,1000,750);
      function blob(x,y,r,col,a){ const rg=ctx.createRadialGradient(x,y,0,x,y,r); rg.addColorStop(0,col); rg.addColorStop(1,"rgba(0,0,0,0)"); ctx.globalAlpha=a; ctx.fillStyle=rg; ctx.fillRect(0,0,1000,750); ctx.globalAlpha=1; }
      blob(170,120,440,T.mag,.5); blob(880,650,460,T.gold,.32);
      const cx=90,cy=90,cw=820,ch=570;
      ctx.save(); rr(ctx,cx,cy,cw,ch,28); ctx.fillStyle="rgba(255,255,255,0.06)"; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle="rgba(255,255,255,0.18)"; ctx.stroke(); ctx.restore();
      const px=cx+50, py=cy+46;
      logo(ctx,px,py,T,44);
      kickerPill(ctx,cx+cw-50,py+9,state.kicker,T,"right");
      const iw=300,ih=300,ix=cx+cw-50-iw,iy=cy+150;
      imgBox(ctx,mainImg,ix,iy,iw,ih,20,T);
      ctx.fillStyle=T.gold; ctx.fillRect(px,cy+168,46,4);
      ctx.fillStyle=T.text; ctx.textAlign="left"; ctx.textBaseline="top"; ctx.font='700 44px "Space Grotesk",sans-serif'; ls(ctx,-.5);
      const tw=ix-px-30; const tl=wrap(ctx,state.title,tw); let ty=cy+188;
      tl.slice(0,4).forEach(l=>{ctx.fillText(l,px,ty); ty+=50;}); ls(ctx,0);
      ctx.fillStyle=T.mut; ctx.font='400 16px "Space Grotesk",sans-serif';
      const sl=wrap(ctx,state.subtitle,tw); ty+=8;
      sl.slice(0,3).forEach(l=>{ctx.fillText(l,px,ty); ty+=23;});
      metricRow(ctx,px,cy+ch-42,T,42,false);
    },
    magazine(ctx,T){
      const g=ctx.createLinearGradient(0,0,0,750); g.addColorStop(0,T.bgB); g.addColorStop(1,T.bgA);
      ctx.fillStyle=g; ctx.fillRect(0,0,1000,750);
      const iw=300; imgBox(ctx,mainImg,1000-iw-40,40,iw,670,20,T);
      const colR=1000-iw-70;
      logo(ctx,64,54,T,42);
      ctx.strokeStyle=T.stroke; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(64,118); ctx.lineTo(colR,118); ctx.stroke();
      ctx.fillStyle=T.mut; ctx.textAlign="left"; ctx.textBaseline="top"; ls(ctx,2.5); ctx.font='400 12px "Space Mono",monospace';
      ctx.fillText((state.kicker||"").toUpperCase(),64,132); ls(ctx,0);
      ctx.fillStyle=T.text; ctx.font='700 76px "Space Grotesk",sans-serif'; ls(ctx,-2);
      const colW=colR-64; const tl=wrap(ctx,state.title,colW); let ty=178;
      tl.slice(0,4).forEach(l=>{ctx.fillText(l,64,ty); ty+=76;}); ls(ctx,0);
      ctx.fillStyle=T.gold; ctx.fillRect(64,ty+8,60,4);
      ctx.fillStyle=T.mut; ctx.font='400 18px "Space Grotesk",sans-serif';
      const sl=wrap(ctx,state.subtitle,colW); let sy=ty+28;
      sl.slice(0,3).forEach(l=>{ctx.fillText(l,64,sy); sy+=26;});
      const ms=metrics(); let mx=64; const my=646;
      ms.forEach((m,i)=>{
        if(i>0){ ctx.strokeStyle=T.stroke; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(mx-24,my-2); ctx.lineTo(mx-24,my+48); ctx.stroke(); }
        ctx.fillStyle=T.gold; ctx.textBaseline="alphabetic"; ctx.textAlign="left"; ctx.font='700 32px "Space Grotesk",sans-serif';
        ctx.fillText(m.v,mx,my+26); const vw=ctx.measureText(m.v).width;
        ctx.fillStyle=T.mut; ls(ctx,1.2); ctx.font='400 10.5px "Space Mono",monospace';
        ctx.fillText((m.l||"").toUpperCase(),mx,my+46); const lw=ctx.measureText((m.l||"").toUpperCase()).width; ls(ctx,0);
        mx+=Math.max(vw,lw)+62;
      });
    },
    split(ctx,T){
      const sy=372;
      if(mainImg){ ctx.save(); ctx.beginPath(); ctx.rect(0,0,1000,sy); ctx.clip(); cover(ctx,mainImg,0,0,1000,sy); ctx.restore(); }
      else { const g=ctx.createLinearGradient(0,0,1000,sy); g.addColorStop(0,T.bgB); g.addColorStop(1,T.mag); ctx.fillStyle=g; ctx.fillRect(0,0,1000,sy); placeholder(ctx,400,116,200,140,16,T); }
      const sg=ctx.createLinearGradient(0,0,0,170); sg.addColorStop(0,"rgba(13,5,14,.6)"); sg.addColorStop(1,"rgba(13,5,14,0)"); ctx.fillStyle=sg; ctx.fillRect(0,0,1000,170);
      logo(ctx,64,52,T,44);
      kickerPill(ctx,936,56,state.kicker,T,"right");
      const g2=ctx.createLinearGradient(0,sy,1000,750); g2.addColorStop(0,T.bgA); g2.addColorStop(1,T.bgB); ctx.fillStyle=g2; ctx.fillRect(0,sy,1000,750-sy);
      ctx.fillStyle=T.gold; ctx.fillRect(0,sy-3,1000,6);
      ctx.fillStyle=T.text; ctx.textAlign="left"; ctx.textBaseline="top"; ctx.font='700 44px "Space Grotesk",sans-serif'; ls(ctx,-.5);
      const tl=wrap(ctx,state.title,700); let ty=sy+42;
      tl.slice(0,2).forEach(l=>{ctx.fillText(l,64,ty); ty+=50;}); ls(ctx,0);
      ctx.fillStyle=T.mut; ctx.font='400 17px "Space Grotesk",sans-serif';
      const sl=wrap(ctx,state.subtitle,640); ty+=6;
      sl.slice(0,2).forEach(l=>{ctx.fillText(l,64,ty); ty+=24;});
      metricRow(ctx,64,686,T,12,true);
    },
    grid(ctx,T){
      bg(ctx,T);
      logo(ctx,64,56,T,44);
      kickerPill(ctx,936,60,state.kicker,T,"right");
      ctx.fillStyle=T.gold; ctx.fillRect(64,150,46,4);
      ctx.fillStyle=T.text; ctx.textAlign="left"; ctx.textBaseline="top"; ctx.font='700 46px "Space Grotesk",sans-serif'; ls(ctx,-.5);
      const tl=wrap(ctx,state.title,872); let ty=170;
      tl.slice(0,2).forEach(l=>{ctx.fillText(l,64,ty); ty+=52;}); ls(ctx,0);
      ctx.fillStyle=T.mut; ctx.font='400 17px "Space Grotesk",sans-serif';
      const sl=wrap(ctx,state.subtitle,760); ty+=6;
      sl.slice(0,2).forEach(l=>{ctx.fillText(l,64,ty); ty+=24;});
      const ms=metrics(); const n=Math.max(ms.length,1);
      const gap=20,x0=64,totalW=872,tileW=(totalW-gap*(n-1))/n,tileH=200,y0=470;
      ms.forEach((m,i)=>{
        const x=x0+i*(tileW+gap);
        ctx.save(); rr(ctx,x,y0,tileW,tileH,18);
        const tg=ctx.createLinearGradient(x,y0,x,y0+tileH); tg.addColorStop(0,"rgba(255,255,255,0.09)"); tg.addColorStop(1,"rgba(255,255,255,0.03)");
        ctx.fillStyle=tg; ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle=T.stroke; ctx.stroke(); ctx.restore();
        ctx.fillStyle=T.mut; ctx.textAlign="left"; ctx.textBaseline="top"; ls(ctx,1.5); ctx.font='400 11px "Space Mono",monospace';
        ctx.fillText("0"+(i+1),x+24,y0+22); ls(ctx,0);
        ctx.fillStyle=T.gold; ctx.textBaseline="alphabetic"; ctx.font='700 54px "Space Grotesk",sans-serif'; ls(ctx,-1);
        ctx.fillText(m.v,x+24,y0+tileH-54); ls(ctx,0);
        ctx.fillStyle=T.mut; ctx.font='400 13px "Space Grotesk",sans-serif';
        ctx.fillText((m.l||""),x+24,y0+tileH-22);
      });
    },
    orbit(ctx,T){
      const g=ctx.createLinearGradient(0,0,1000,750); g.addColorStop(0,T.bgA); g.addColorStop(1,T.bgB); ctx.fillStyle=g; ctx.fillRect(0,0,1000,750);
      const ox=765,oy=375;
      ctx.lineWidth=2;
      for(let i=0;i<8;i++){ const r=110+i*70; ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2); ctx.strokeStyle=i%2?"rgba(232,192,121,0.16)":"rgba(194,75,194,0.18)"; ctx.stroke(); }
      const rg=ctx.createRadialGradient(ox,oy,0,ox,oy,440); rg.addColorStop(0,T.glow); rg.addColorStop(1,"rgba(0,0,0,0)"); ctx.globalAlpha=.5; ctx.fillStyle=rg; ctx.fillRect(0,0,1000,750); ctx.globalAlpha=1;
      const cr=180;
      if(mainImg){ ctx.save(); ctx.beginPath(); ctx.arc(ox,oy,cr,0,Math.PI*2); ctx.clip(); cover(ctx,mainImg,ox-cr,oy-cr,cr*2,cr*2); ctx.restore();
        ctx.save(); ctx.beginPath(); ctx.arc(ox,oy,cr,0,Math.PI*2); ctx.lineWidth=2; ctx.strokeStyle="rgba(255,255,255,0.28)"; ctx.stroke(); ctx.restore(); }
      else { ctx.save(); ctx.beginPath(); ctx.arc(ox,oy,cr,0,Math.PI*2); ctx.fillStyle=T.panel; ctx.fill(); ctx.setLineDash([8,8]); ctx.lineWidth=1.5; ctx.strokeStyle=T.stroke; ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle=T.mut; ctx.textAlign="center"; ctx.textBaseline="middle"; ls(ctx,2); ctx.font='400 13px "Space Mono",monospace'; ctx.fillText("DROP IMAGE",ox,oy); ls(ctx,0); ctx.restore(); }
      logo(ctx,64,56,T,46);
      kickerPill(ctx,64,150,state.kicker,T,"left");
      ctx.fillStyle=T.gold; ctx.fillRect(64,232,46,4);
      ctx.fillStyle=T.text; ctx.textAlign="left"; ctx.textBaseline="top"; ctx.font='700 50px "Space Grotesk",sans-serif'; ls(ctx,-.5);
      const tl=wrap(ctx,state.title,452); let ty=252;
      tl.slice(0,4).forEach(l=>{ctx.fillText(l,64,ty); ty+=56;}); ls(ctx,0);
      ctx.fillStyle=T.mut; ctx.font='400 17px "Space Grotesk",sans-serif';
      const sl=wrap(ctx,state.subtitle,420); ty+=8;
      sl.slice(0,2).forEach(l=>{ctx.fillText(l,64,ty); ty+=24;});
      metricRow(ctx,64,656,T,48,false);
    },
    frame(ctx,T){
      bg(ctx,T);
      const m=34;
      ctx.lineWidth=2; ctx.strokeStyle=T.gold; ctx.strokeRect(m,m,1000-2*m,750-2*m);
      ctx.lineWidth=1; ctx.strokeStyle="rgba(232,192,121,0.4)"; ctx.strokeRect(m+8,m+8,1000-2*m-16,750-2*m-16);
      if(state.kicker){ ctx.font='700 12px "Space Mono",monospace'; ls(ctx,3); const tw=ctx.measureText(state.kicker.toUpperCase()).width; const padX=22,w=tw+padX*2,h=34,x=500-w/2,y=m-h/2;
        rr(ctx,x,y,w,h,9); ctx.fillStyle=T.bgA; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=T.gold; ctx.stroke();
        ctx.fillStyle=T.gold; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(state.kicker.toUpperCase(),500,y+h/2+1); ls(ctx,0); }
      const lw=logoWidth(ctx,44); logo(ctx,500-lw/2,86,T,44);
      const iw=620,ih=246,ix=500-iw/2,iy=172; imgBox(ctx,mainImg,ix,iy,iw,ih,18,T);
      ctx.fillStyle=T.text; ctx.textAlign="center"; ctx.textBaseline="top"; ctx.font='700 44px "Space Grotesk",sans-serif'; ls(ctx,-.5);
      const tl=wrap(ctx,state.title,720); let ty=450;
      tl.slice(0,2).forEach(l=>{ctx.fillText(l,500,ty); ty+=50;}); ls(ctx,0);
      ctx.fillStyle=T.mut; ctx.font='400 17px "Space Grotesk",sans-serif';
      const sl=wrap(ctx,state.subtitle,640); ty+=6;
      sl.slice(0,2).forEach(l=>{ctx.fillText(l,500,ty); ty+=24;});
      const ms=metrics();
      if(ms.length){ ctx.font='700 30px "Space Grotesk",sans-serif'; let total=0;
        const ws=ms.map(mm=>{const a=ctx.measureText(mm.v).width; ctx.font='400 10.5px "Space Mono",monospace';ls(ctx,1.2);const b=ctx.measureText((mm.l||"").toUpperCase()).width;ls(ctx,0); ctx.font='700 30px "Space Grotesk",sans-serif'; const w=Math.max(a,b); total+=w; return w;});
        const gap=60; total+=gap*(ms.length-1); let cx=500-total/2; const my=636;
        ms.forEach((mm,i)=>{ ctx.textAlign="left"; ctx.fillStyle=T.gold; ctx.textBaseline="alphabetic"; ctx.font='700 30px "Space Grotesk",sans-serif'; ctx.fillText(mm.v,cx,my);
          ctx.fillStyle=T.mut; ctx.font='400 10.5px "Space Mono",monospace'; ls(ctx,1.2); ctx.fillText((mm.l||"").toUpperCase(),cx,my+20); ls(ctx,0); cx+=ws[i]+gap; }); }
    }
  };

  function paint(ctx){ const T=theme(); ctx.clearRect(0,0,1000,750); (DRAW[state.template]||DRAW.editorial)(ctx,T); }
  const cv=$("cv");
  function render(){
    const S=Math.min(window.devicePixelRatio||1,2)*2;
    cv.width=1000*S; cv.height=750*S;
    const ctx=cv.getContext("2d"); ctx.setTransform(S,0,0,S,0,0); ctx.textBaseline="top"; paint(ctx);
  }
  function buildURL(type){
    const c=document.createElement("canvas"); c.width=1000; c.height=750;
    const ctx=c.getContext("2d"); ctx.setTransform(1,0,0,1,0,0); ctx.textBaseline="top";
    if(type==="jpeg"){ ctx.fillStyle="#000"; ctx.fillRect(0,0,1000,750); }
    paint(ctx);
    return c.toDataURL(type==="jpeg"?"image/jpeg":"image/png", type==="jpeg"?0.95:undefined);
  }
  function dataURLtoBlob(durl){
    const parts=durl.split(","); const mime=(parts[0].match(/:(.*?);/)||[,"image/png"])[1];
    const bin=atob(parts[1]); const len=bin.length; const arr=new Uint8Array(len);
    for(let i=0;i<len;i++) arr[i]=bin.charCodeAt(i);
    return new Blob([arr],{type:mime});
  }
  function showExport(durl,fn){
    let blobUrl; try{ blobUrl=URL.createObjectURL(dataURLtoBlob(durl)); }catch(e){ blobUrl=durl; }
    const ov=document.createElement("div"); ov.className="ov";
    const box=document.createElement("div"); box.className="ovbox";
    box.innerHTML='<div class="ovtop"><b>'+fn+'</b><button class="ovx">✕</button></div>';
    const img=document.createElement("img"); img.src=blobUrl; box.appendChild(img);
    const row=document.createElement("div"); row.className="ovrow";
    const a=document.createElement("a"); a.className="btn solid"; a.textContent="↓ Download"; a.href=blobUrl; a.download=fn;
    const a2=document.createElement("a"); a2.className="btn ghost"; a2.textContent="Open in new tab"; a2.href=blobUrl; a2.target="_blank"; a2.rel="noopener";
    const hint=document.createElement("span"); hint.className="ovhint"; hint.textContent="If nothing downloads, use \u201cOpen in new tab\u201d or right-click the image \u2192 Save image as\u2026";
    row.appendChild(a); row.appendChild(a2); row.appendChild(hint); box.appendChild(row); ov.appendChild(box);
    document.getElementById("app").appendChild(ov);
    function close(){ try{ if(blobUrl!==durl) setTimeout(()=>URL.revokeObjectURL(blobUrl),3000); }catch(e){} ov.remove(); }
    box.querySelector(".ovx").onclick=close;
    ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  }
  function exportImg(type){
    let durl; try{ durl=buildURL(type); }catch(e){ alert("Export failed: "+e.message); return; }
    showExport(durl, "monarchi-"+state.template+"-"+state.format+(type==="jpeg"?".jpg":".png"));
  }

  const SW={
    editorial:c=>"linear-gradient(135deg,"+c.bgA+","+c.bgB+")",
    diagonal:c=>"linear-gradient(115deg,"+c.bgB+" 45%,"+c.mag+" 45%,"+c.gold+")",
    poster:c=>"linear-gradient(135deg,"+c.bgA+","+c.mag+")",
    showcase:c=>"linear-gradient(180deg,#5a2d57,"+c.bgA+")",
    glass:c=>"radial-gradient(120% 120% at 28% 18%,"+c.mag+" 0%,"+c.bgB+" 52%,"+c.bgA+" 100%)",
    magazine:c=>"linear-gradient(180deg,"+c.bgB+","+c.bgA+")",
    split:c=>"linear-gradient(180deg,"+c.mag+" 0 50%,"+c.bgA+" 50% 100%)",
    grid:c=>"linear-gradient(135deg,"+c.bgB+","+c.bgA+")",
    orbit:c=>"radial-gradient(circle at 76% 50%,"+c.glow+" 0%,"+c.bgB+" 45%,"+c.bgA+" 100%)",
    frame:c=>"linear-gradient(135deg,"+c.bgA+","+c.bgB+")"
  };
  function buildCards(){
    const box=$("cards"); box.innerHTML=""; const c=state.colors;
    TEMPLATES.forEach((t,i)=>{
      const b=document.createElement("button"); b.className="card"+(state.template===t.id?" on":""); b.dataset.tpl=t.id;
      b.innerHTML='<div class="sw"></div><div class="num">0'+(i+1)+'</div><div class="nm">'+t.nm+'</div>';
      const sw=b.querySelector(".sw");
      sw.style.background=(SW[t.id]||SW.editorial)(c);
      if(t.id==="frame") sw.style.boxShadow="inset 0 0 0 3px "+c.gold;
      b.onclick=()=>{ state.template=t.id; save(); buildCards(); render(); };
      box.appendChild(b);
    });
  }
  function buildPresets(){
    const box=$("presets"); box.innerHTML="";
    Object.keys(PRESETS).forEach(k=>{
      const p=PRESETS[k]; const b=document.createElement("button"); b.className="preset"; b.title=k;
      b.style.background="linear-gradient(135deg,"+p.bgA+","+p.bgB+" 55%,"+p.mag+")";
      if(JSON.stringify(p)===JSON.stringify(state.colors)) b.classList.add("on");
      b.onclick=()=>{ state.colors=clone(p); save(); syncColors(); buildPresets(); buildCards(); render(); };
      box.appendChild(b);
    });
  }
  function syncColors(){ $("cBgA").value=state.colors.bgA;$("cBgB").value=state.colors.bgB;$("cGlow").value=state.colors.glow;$("cGold").value=state.colors.gold;$("cMag").value=state.colors.mag; }
  function bindColors(){
    const map={cBgA:"bgA",cBgB:"bgB",cGlow:"glow",cGold:"gold",cMag:"mag"};
    Object.keys(map).forEach(id=>{ $(id).oninput=e=>{ state.colors[map[id]]=e.target.value; save(); buildPresets(); buildCards(); render(); }; });
  }

  function syncSlot(data){
    const slot=$("imgSlot"), clr=$("imgClear");
    if(data){ slot.innerHTML=""; const im=document.createElement("img"); im.src=data; slot.appendChild(im); clr.hidden=false; }
    else { slot.innerHTML='<div class="slot-in"><span class="up">⬆</span><b>Main image</b><i>click or drop</i></div>'; clr.hidden=true; }
  }
  function fileToData(file,cb){ const r=new FileReader(); r.onload=e=>cb(e.target.result); r.readAsDataURL(file); }
  function setMain(d){ state.mainData=d; loadImg(d,im=>mainImg=im); syncSlot(d); save(); }
  function bindImage(){
    const slot=$("imgSlot"), file=$("imgFile");
    slot.onclick=()=>file.click();
    file.onchange=e=>{ const f=e.target.files[0]; if(f) fileToData(f,setMain); file.value=""; };
    ["dragover","dragenter"].forEach(ev=>slot.addEventListener(ev,e=>{e.preventDefault();slot.classList.add("drag");}));
    ["dragleave","drop"].forEach(ev=>slot.addEventListener(ev,e=>{e.preventDefault();slot.classList.remove("drag");}));
    slot.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith("image/")) fileToData(f,setMain); });
    $("imgClear").onclick=()=>{ state.mainData=null; mainImg=null; syncSlot(null); save(); render(); };
  }
  function bindCanvasDrop(){
    const w=cv.parentElement;
    ["dragover","dragenter"].forEach(ev=>w.addEventListener(ev,e=>{e.preventDefault();w.classList.add("drag");}));
    w.addEventListener("dragleave",e=>{ if(e.target===w) w.classList.remove("drag"); });
    w.addEventListener("drop",e=>{ e.preventDefault(); w.classList.remove("drag");
      const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith("image/")) fileToData(f,setMain); });
  }
  function bindFields(){
    $("fmt").value=state.format; $("kicker").value=state.kicker; $("title").value=state.title; $("subtitle").value=state.subtitle;
    $("m1v").value=state.metrics[0]?.v||""; $("m1l").value=state.metrics[0]?.l||"";
    $("m2v").value=state.metrics[1]?.v||""; $("m2l").value=state.metrics[1]?.l||"";
    $("m3v").value=state.metrics[2]?.v||""; $("m3l").value=state.metrics[2]?.l||"";
    syncColors(); updateMeta();
  }
  function bindOnce(){
    $("fmt").onchange=e=>{ state.format=e.target.value; updateMeta(); save(); render(); };
    const bt=(id,k)=>{ $(id).oninput=e=>{ state[k]=e.target.value; save(); render(); }; };
    bt("kicker","kicker"); bt("title","title"); bt("subtitle","subtitle");
    const bm=(idv,idl,i)=>{ const u=()=>{ state.metrics[i]={v:$(idv).value,l:$(idl).value}; save(); render(); }; $(idv).oninput=u; $(idl).oninput=u; };
    bm("m1v","m1l",0); bm("m2v","m2l",1); bm("m3v","m3l",2);
    bindColors(); bindImage(); bindCanvasDrop();
    $("pngBtn").onclick=()=>exportImg("png");
    $("jpgBtn").onclick=()=>exportImg("jpeg");
    $("resetBtn").onclick=()=>{
      state=clone(DEFAULT); mainImg=null;
      try{ localStorage.removeItem(KEY); }catch(e){}
      syncSlot(null); bindFields(); buildPresets(); buildCards(); render();
    };
  }
  function updateMeta(){ $("metaLine").textContent="1000 × 750 · "+(state.format==="portfolio"?"Upwork Portfolio":"Upwork Project Catalog"); }

  load();
  bindFields(); bindOnce(); buildPresets(); buildCards();
  if(state.mainData){ syncSlot(state.mainData); loadImg(state.mainData,im=>mainImg=im); }
  render();
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(render); }
  setTimeout(render,400); setTimeout(render,1200);
  window.addEventListener("resize",render);
})();
</script>
